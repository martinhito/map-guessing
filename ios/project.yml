name: MapGuessing
options:
  bundleIdPrefix: com.martinhito
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: "7.0.0"

targets:
  MapGuessing:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MapGuessing
        excludes:
          - "Preview Content"
    resources:
      - path: MapGuessing/Preview Content
      - path: MapGuessing/Assets.xcassets
    info:
      path: MapGuessing/Info.plist
      properties:
        CFBundleDisplayName: Guess the Map
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        UIRequiresFullScreen: false
    dependencies:
      - package: Kingfisher
    settings:
      base:
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.martinhito.mapguessing
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_PREVIEWS: YES
